<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8" />
  <title>Nexio</title>
  <link rel="stylesheet" href="./assets/css/style.css">
  <link rel="icon" type="image/png" href="./assets/image/N.png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body>
  <div class="auth-page">

    <!-- Left Side -->
    <div class="auth-left">
      <div class="brand">
        <h1>Nexio</h1>
        <p>Welcome to Nexio</p>
      </div>
    </div>

    <!-- Right Side -->
    <div class="auth-right">
      <div class="auth-card">

        <!-- Logo -->
        <div class="logo-box">
          <img src="./assets/image/N.png" alt="Nexio Logo">
        </div>

        <!-- Tabs -->
        <div class="tabs">
          <button id="loginTab" class="tab active">Login</button>
          <button id="registerTab" class="tab">Register</button>
        </div>

        <!-- Form Slider -->
        <div class="form-slider">

          <!-- Login Form -->
          <form id="loginForm" class="form-box active">
            <h3>Login</h3>

            <input id="loginUser" type="text" placeholder="Username">
            <input id="loginPass" type="password" placeholder="Password">

            <button type="button" class="primary-btn" id="loginBtn">Sign In</button>

            <p class="switch-text">
              Don’t have an account?
              <a id="goRegister" class="link">Create one here</a>
            </p>
          </form>

          <!-- Register Form -->
          <form id="registerForm" class="form-box">
            <h3>Register</h3>

            <input id="regUser" type="text" placeholder="Username">
            <input id="regEmail" type="email" placeholder="Email Address">
            <input id="regPass" type="password" placeholder="Password">

            <label class="checkbox">
              <input id="regCheck" type="checkbox">
              <span>I agree to the Terms of Use</span>
            </label>

            <button type="button" class="primary-btn" id="registerBtn">Sign Up</button>

            <p class="switch-text">
              Already have an account?
              <a id="goLogin" class="link">Login here</a>
            </p>
          </form>

        </div>

        <!-- Social Login Buttons -->
        <div class="social-login">

          <button class="social google">
            <img src="./assets/image/google.png" alt="Google">
          </button>

          <button class="social facebook">
            <img src="./assets/image/facebook.png" alt="Facebook">
          </button>

          <button class="social linkedin">
            <img src="./assets/image/linkedin.png" alt="LinkedIn">
          </button>

          <button class="social twitter">
            <img src="./assets/image/twitter.png" alt="Twitter">
          </button>

        </div>

      </div>
    </div>

  </div>

  <script src="./assets/js/script.js"></script>
</body>
</html>
